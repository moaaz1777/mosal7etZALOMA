<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مصالحة زلومة 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender-1:#f6f1fb;
    --lavender-2:#e8dcf7;
    --lavender-3:#d6c2ee;
    --lavender-4:#b795e0;
    --lavender-5:#8a5fc7;
    --deep:#5b3a91;
    --white:#ffffff;
    --gold:#e9c9a3;
    --shadow-color: rgba(139, 95, 199, 0.25);
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  html,body{
    height:100%;
    overflow-x:hidden;
  }

  body{
    font-family:'Tajawal', sans-serif;
    background:linear-gradient(160deg, var(--lavender-1) 0%, var(--lavender-2) 45%, var(--lavender-3) 100%);
    color:var(--deep);
    min-height:100vh;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  .display{
    font-family:'Aref Ruqaa', serif;
  }

  /* ============ Loading Screen ============ */
  #loading-screen{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    background:linear-gradient(160deg, var(--lavender-4) 0%, var(--lavender-5) 100%);
    transition:opacity 0.7s ease, visibility 0.7s ease;
  }
  #loading-screen.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .loader-heart{
    font-size:44px;
    animation:pulseHeart 1s ease-in-out infinite;
    filter:drop-shadow(0 0 12px rgba(255,255,255,0.6));
  }
  @keyframes pulseHeart{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.25);}
  }
  .loader-text{
    color:#fff;
    font-size:1.15rem;
    font-weight:500;
    letter-spacing:0.5px;
    text-shadow:0 2px 10px rgba(0,0,0,0.15);
  }
  .loader-bar{
    width:160px;
    height:4px;
    border-radius:4px;
    background:rgba(255,255,255,0.3);
    overflow:hidden;
  }
  .loader-bar-fill{
    height:100%;
    width:0%;
    background:#fff;
    border-radius:4px;
    animation:loadFill 1s ease forwards;
  }
  @keyframes loadFill{
    to{width:100%;}
  }

  /* ============ Floating background layer (shared) ============ */
  .bg-scene{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .glow-orb{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.45;
  }
  .glow-orb.a{width:280px;height:280px;background:var(--lavender-4);top:-60px;right:-60px;}
  .glow-orb.b{width:220px;height:220px;background:var(--gold);bottom:0;left:-50px;opacity:0.25;}

  .lily{
    position:absolute;
    width:34px;
    height:34px;
    opacity:0.85;
    animation-name:floatLily;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
    filter:drop-shadow(0 4px 8px rgba(139,95,199,0.25));
  }
  @keyframes floatLily{
    0%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-26px) rotate(12deg);}
    100%{transform:translateY(0) rotate(0deg);}
  }

  .heart-float{
    position:absolute;
    color:var(--lavender-5);
    opacity:0.55;
    animation-name:floatHeart;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  @keyframes floatHeart{
    0%{transform:translateY(0) scale(1); opacity:0.2;}
    50%{transform:translateY(-40px) scale(1.15); opacity:0.7;}
    100%{transform:translateY(0) scale(1); opacity:0.2;}
  }

  /* ============ Page container / transitions ============ */
  .page{
    position:relative;
    z-index:1;
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    text-align:center;
  }
  .page.hidden-page{
    display:none;
  }

  .fade-zoom-out{
    animation:fadeZoomOut 0.7s ease forwards;
  }
  @keyframes fadeZoomOut{
    0%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.15);}
  }
  .fade-zoom-in{
    animation:fadeZoomIn 0.8s ease forwards;
  }
  @keyframes fadeZoomIn{
    0%{opacity:0; transform:scale(0.85);}
    100%{opacity:1; transform:scale(1);}
  }

  /* ============ Page 1 ============ */
  #page1{
    min-height:100vh;
    justify-content:center;
    gap:8px;
  }
  .title-main{
    font-size:clamp(2.4rem, 9vw, 3.6rem);
    font-weight:700;
    color:var(--deep);
    text-shadow:0 4px 18px rgba(139,95,199,0.35);
    animation:riseIn 1s ease both;
    animation-delay:0.15s;
  }
  .subtitle{
    margin-top:14px;
    font-size:clamp(1.05rem, 4.5vw, 1.35rem);
    font-weight:500;
    color:#6b4a9e;
    animation:riseIn 1s ease both;
    animation-delay:0.4s;
  }
  @keyframes riseIn{
    0%{opacity:0; transform:translateY(18px);}
    100%{opacity:1; transform:translateY(0);}
  }

  .btn-row{
    margin-top:44px;
    display:flex;
    gap:22px;
    align-items:center;
    justify-content:center;
    animation:riseIn 1s ease both;
    animation-delay:0.65s;
    position:relative;
    width:100%;
  }

  .btn{
    border:none;
    outline:none;
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    padding:16px 40px;
    border-radius:50px;
    cursor:pointer;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow:0 8px 22px var(--shadow-color);
  }
  .btn:active{transform:scale(0.95);}

  .btn-no{
    background:linear-gradient(135deg, var(--lavender-5), var(--deep));
    color:#fff;
  }
  .btn-no:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(91,58,145,0.4);
  }

  .btn-yes{
    background:#fff;
    color:var(--deep);
    border:2px solid var(--lavender-3);
    position:relative;
    z-index:5;
  }
  #btn-yes.escaping, .escaping{
    position:fixed;
    transition:top 0.35s cubic-bezier(.2,.9,.3,1.3), left 0.35s cubic-bezier(.2,.9,.3,1.3);
  }

  .hint-text{
    margin-top:18px;
    font-size:0.85rem;
    color:#9c85c4;
    opacity:0;
    animation:riseIn 1s ease both;
    animation-delay:1.1s;
  }

  /* ============ Page 2 ============ */
  #page2{
    padding-top:50px;
    padding-bottom:60px;
    min-height:100vh;
  }

  .letter{
    max-width:480px;
    width:100%;
    background:
      linear-gradient(rgba(255,255,255,0.72), rgba(255,255,255,0.72)),
      repeating-linear-gradient(0deg, rgba(139,95,199,0.03) 0px, rgba(139,95,199,0.03) 1px, transparent 1px, transparent 26px);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:26px;
    padding:38px 26px 34px;
    box-shadow:
      0 20px 50px rgba(139,95,199,0.28),
      0 2px 6px rgba(139,95,199,0.15),
      inset 0 1px 1px rgba(255,255,255,0.9);
    position:relative;
    animation:letterRise 1s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes letterRise{
    0%{opacity:0; transform:translateY(40px) rotateX(8deg);}
    100%{opacity:1; transform:translateY(0) rotateX(0deg);}
  }

  .letter::before{
    content:"❀";
    position:absolute;
    top:-18px;
    right:50%;
    transform:translateX(50%);
    background:radial-gradient(circle, #fff 55%, transparent 60%);
    color:var(--lavender-5);
    font-size:2rem;
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .letter-title{
    font-size:clamp(1.5rem, 6vw, 1.9rem);
    font-weight:700;
    color:var(--deep);
    margin-bottom:20px;
    text-shadow:0 2px 10px rgba(139,95,199,0.25);
  }

  .letter-body{
    font-size:1rem;
    line-height:2.15;
    color:#4a3570;
    font-weight:400;
    text-align:center;
    white-space:pre-line;
  }

  .letter-body b{
    font-weight:700;
    color:var(--deep);
  }

  .forgive-btn-wrap{
    margin-top:34px;
    animation:riseIn 1s ease both;
    animation-delay:0.4s;
  }

  .btn-forgive{
    background:linear-gradient(135deg, #a97fdb, var(--deep));
    color:#fff;
    font-size:1.1rem;
    padding:17px 46px;
    border-radius:50px;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 28px rgba(91,58,145,0.4);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    position:relative;
    overflow:hidden;
  }
  .btn-forgive::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
    transform:translateX(-100%);
    animation:shimmer 2.6s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%{transform:translateX(-100%);}
    50%{transform:translateX(100%);}
    100%{transform:translateX(100%);}
  }
  .btn-forgive:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 16px 36px rgba(91,58,145,0.5);
  }
  .btn-forgive:active{transform:scale(0.94);}

  /* thank you message */
  .thanks-msg{
    margin-top:26px;
    font-size:1.3rem;
    font-weight:700;
    color:var(--deep);
    opacity:0;
    transform:translateY(14px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  .thanks-msg.show{
    opacity:1;
    transform:translateY(0);
  }

  /* ============ Final screen ============ */
  #final-screen{
    position:fixed;
    inset:0;
    z-index:200;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(160deg, var(--lavender-4), var(--deep));
    opacity:0;
    visibility:hidden;
    transition:opacity 1.2s ease, visibility 1.2s ease;
  }
  #final-screen.show{
    opacity:1;
    visibility:visible;
  }
  .final-text{
    font-family:'Aref Ruqaa', serif;
    font-size:clamp(2.2rem, 10vw, 3.4rem);
    color:#fff;
    text-shadow:0 6px 24px rgba(0,0,0,0.25);
    animation:finalPulse 2.2s ease-in-out infinite;
  }
  @keyframes finalPulse{
    0%,100%{transform:scale(1); text-shadow:0 6px 24px rgba(0,0,0,0.25);}
    50%{transform:scale(1.06); text-shadow:0 8px 34px rgba(255,255,255,0.35);}
  }

  /* falling lilies + confetti hearts (page2 celebration) */
  .falling-item{
    position:fixed;
    top:-40px;
    z-index:150;
    pointer-events:none;
    animation-name:fallDown;
    animation-timing-function:ease-in;
    animation-iteration-count:1;
  }
  @keyframes fallDown{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(110vh) rotate(360deg); opacity:0.2;}
  }

  .confetti-heart{
    position:fixed;
    top:50%;
    left:50%;
    z-index:150;
    pointer-events:none;
    font-size:1.4rem;
    animation-name:burstOut;
    animation-timing-function:cubic-bezier(.2,.8,.2,1);
    animation-iteration-count:1;
  }
  @keyframes burstOut{
    0%{transform:translate(-50%,-50%) scale(0.4); opacity:1;}
    100%{transform:translate(var(--tx), var(--ty)) scale(1); opacity:0;}
  }

  @media (max-width:420px){
    .btn{padding:14px 32px; font-size:1rem;}
    .letter{padding:30px 18px 28px;}
  }

  /* ============ Music toggle ============ */
  #music-toggle{
    position:fixed;
    top:16px;
    left:16px;
    z-index:500;
    width:48px;
    height:48px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.6);
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.25rem;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(139,95,199,0.3);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  #music-toggle:hover{
    transform:scale(1.08);
    box-shadow:0 10px 24px rgba(139,95,199,0.4);
  }
  #music-toggle:active{transform:scale(0.92);}
  #music-toggle .bars{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:16px;
  }
  #music-toggle .bars span{
    width:3px;
    background:var(--lavender-5);
    border-radius:2px;
    animation:barBounce 0.9s ease-in-out infinite;
  }
  #music-toggle .bars span:nth-child(1){animation-delay:0s; height:6px;}
  #music-toggle .bars span:nth-child(2){animation-delay:0.15s; height:14px;}
  #music-toggle .bars span:nth-child(3){animation-delay:0.3s; height:9px;}
  @keyframes barBounce{
    0%,100%{transform:scaleY(0.5);}
    50%{transform:scaleY(1);}
  }
  #music-toggle.muted .bars span{
    animation-play-state:paused;
    transform:scaleY(0.3);
    background:#b6a4d6;
  }

  .amirti-caption{
    font-family:'Aref Ruqaa', serif;
    font-size:1.3rem;
    color:var(--deep);
    margin-top:22px;
    margin-bottom:14px;
    text-shadow:0 2px 8px rgba(139,95,199,0.25);
    opacity:0;
    transform:translateY(14px);
    transition:opacity 0.9s ease, transform 0.9s ease;
  }
  .amirti-caption.reveal{
    opacity:1;
    transform:translateY(0);
  }
  .letter-photo{
    width:100%;
    max-width:320px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(139,95,199,0.35);
    border:4px solid #fff;
    margin:0 auto;
    display:block;
    opacity:0;
    transform:translateY(14px) scale(0.97);
    transition:opacity 1.1s ease, transform 1.1s ease;
  }
  .letter-photo.reveal{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  .credit-tag{
    position:fixed;
    bottom:10px;
    left:10px;
    z-index:400;
    font-size:0.7rem;
    color:var(--deep);
    opacity:0.2;
    pointer-events:none;
    font-weight:400;
    letter-spacing:0.3px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }
</style>
</head>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loader-heart">💜</div>
  <div class="loader-text">Loading Love... 💜</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- credit tag -->
<div class="credit-tag">ana elly 3amlo✌🏻</div>

<!-- MUSIC TOGGLE -->

  <div class="bars"><span></span><span></span><span></span></div>
</button>

<!-- shared floating background -->

  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>

</div>

function svgDataUri(svg){
  return "data:image/svg+xml;base64," + btoa(svg);

/* ---------------- Ambient romantic background music ---------------- */
/* Synthesized soft pad + gentle sparkles - no external files needed */
const MusicEngine = (() => {
  let ctx = null;
  let masterGain = null;
  let filter = null;
  let started = false;
  let muted = false;
  let chordTimer = null;
  let sparkleTimer = null;
  const targetVolume = 0.33;

  // warm, romantic chord progression (Fmaj7 - Am7 - Dm7 - Gsus)
  const chords = [
    [174.61, 220.00, 261.63, 329.63],
    [220.00, 261.63, 329.63, 392.00],
    [146.83, 174.61, 220.00, 261.63],
    [196.00, 246.94, 293.66, 392.00]
  ];
  let chordIndex = 0;

  function ensureContext(){
    if(ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0;
    filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1400;
    filter.Q.value = 0.5;
    masterGain.connect(filter);
    filter.connect(ctx.destination);
  }

  function playChord(freqs, duration){
    const now = ctx.currentTime;
    freqs.forEach((freq) => {
      [1, 1.003].forEach((detune) => { // two slightly detuned voices per note = warm chorus
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq * detune;
        const g = ctx.createGain();
        g.gain.value = 0;
        osc.connect(g);
        g.connect(masterGain);
        osc.start(now);
        // slow swell in, gentle sustain, slow release
        g.gain.linearRampToValueAtTime(0.30, now + duration * 0.35);
        g.gain.linearRampToValueAtTime(0.22, now + duration * 0.7);
        g.gain.linearRampToValueAtTime(0, now + duration);
        osc.stop(now + duration + 0.1);
      });
    });
  }

  function scheduleChords(){
    const chordDuration = 6.5;
    playChord(chords[chordIndex], chordDuration);
    chordIndex = (chordIndex + 1) % chords.length;
    chordTimer = setTimeout(scheduleChords, chordDuration * 1000 * 0.9);
  }

  function playSparkle(){
    if(!ctx) return;
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 987.77, 1046.5]; // soft bell-like pitches
    const freq = notes[Math.floor(Math.random()*notes.length)];
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.value = 0;
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    g.gain.linearRampToValueAtTime(0.09, now + 0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);
    osc.stop(now + 1.9);
  }

  function scheduleSparkles(){
    const delay = 3000 + Math.random()*4000;
    sparkleTimer = setTimeout(() => {
      if(!muted) playSparkle();
      scheduleSparkles();
    }, delay);
  }

  function start(){
    ensureContext();
    if(ctx.state === 'suspended'){
      ctx.resume();
    }
    if(!started){
      started = true;
      scheduleChords();
      scheduleSparkles();
    }
    if(!muted){
      masterGain.gain.cancelScheduledValues(ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(targetVolume, ctx.currentTime + 1.5);
    }
  }

  function setMuted(state){
    muted = state;
    if(!ctx) return;
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(muted ? 0 : targetVolume, ctx.currentTime + 0.6);
  }

  function isMuted(){ return muted; }

  return { start, setMuted, isMuted };
})();

function setupMusicToggle(){
  const btn = document.getElementById('music-toggle');
  let firstInteractionDone = false;

  function tryAutoStart(){
    if(firstInteractionDone) return;
    firstInteractionDone = true;
    MusicEngine.start();
    document.removeEventListener('click', tryAutoStart);
    document.removeEventListener('touchstart', tryAutoStart);
  }
  document.addEventListener('click', tryAutoStart, {passive:true});
  document.addEventListener('touchstart', tryAutoStart, {passive:true});

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if(!firstInteractionDone){
      firstInteractionDone = true;
      MusicEngine.start();
    }
    const nowMuted = !MusicEngine.isMuted();
    MusicEngine.setMuted(nowMuted);
    btn.classList.toggle('muted', nowMuted);
  });
}

/* ---------------- Generic escaping-button system ---------------- */
/* Used for the "أه" button on page 1, and the "لا" button on page 2.
   Never lands on top of / too close to its sibling button. */
const page1 = document.getElementById('page1');
const page2 = document.getElementById('page2');

function createEscapingButton(btn, siblingBtn, isPageActiveFn){
  function moveRandom(){
    const margin = 20;
    const btnW = btn.offsetWidth || 110;
    const btnH = btn.offsetHeight || 54;
    const maxX = window.innerWidth - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;

    const minSafeDist = Math.max(btnW, btnH) * 1.6;
    let newX, newY, tries = 0;
    do{
      newX = Math.max(margin, Math.random()*maxX);
      newY = Math.max(margin, Math.random()*maxY);
      tries++;
      if(!siblingBtn) break;
      const sRect = siblingBtn.getBoundingClientRect();
      const sX = sRect.left, sY = sRect.top;
      const dist = Math.hypot((newX - sX), (newY - sY));
      if(dist >= minSafeDist) break;
    } while(tries < 12);

    if(!btn.classList.contains('escaping')){
      btn.classList.add('escaping');
    }
    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';
  }

  function handleMouseMove(e){
    if(!isPageActiveFn()) return;
    const rect = btn.getBoundingClientRect();
    const btnCenterX = rect.left + rect.width/2;
    const btnCenterY = rect.top + rect.height/2;
    const dist = Math.hypot(e.clientX - btnCenterX, e.clientY - btnCenterY);
    const threshold = 110;
    if(dist < threshold){
      moveRandom();
    }
  }
  document.addEventListener('mousemove', handleMouseMove);

  function preventTouch(e){
    e.preventDefault();
    moveRandom();
  }
  btn.addEventListener('touchstart', preventTouch, {passive:false});
  btn.addEventListener('pointerdown', function(e){
    if(e.pointerType === 'touch'){
      preventTouch(e);
    }
  });
  btn.addEventListener('click', function(e){
    e.preventDefault();
    moveRandom();
  });

  window.addEventListener('resize', () => {
    if(btn.classList.contains('escaping')){
      btn.style.left = '';
      btn.style.top = '';
      btn.classList.remove('escaping');
    }
  });

  return { moveRandom };
}

const letterLines = [
"انا اسف اوي يعمري اني بزعلك كتير مني",
"عارف انك زعلانه مني ومبقتيش بتحبيني زي الاول",
"بس عايزك تبقي عارفه ان عمري م بيبقى قصدي ازعلك",
"انتِ عمري وروحي وحياتي وكل حاجة ليا وبحبك اوي اوي",
"مش عايزك تزعلي مني يـ سلومي"
];

function typeLetter(){
  const container = document.getElementById('letter-body');
  if(container.dataset.done) return;
  container.dataset.done = "1";
  letterLines.forEach((line, i) => {
    const p = document.createElement('div');
    p.textContent = line;
    p.style.opacity = 0;
    p.style.transform = 'translateY(10px)';
    p.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    p.style.marginBottom = '4px';
    container.appendChild(p);
    setTimeout(() => {
      p.style.opacity = 1;
      p.style.transform = 'translateY(0)';
    }, 300 + i*180);
  });

  const revealDelay = 300 + letterLines.length*180 + 500;
  setTimeout(() => {
    document.getElementById('amirti-caption').classList.add('reveal');
  }, revealDelay);
  setTimeout(() => {
    document.getElementById('amirti-photo').classList.add('reveal');
  }, revealDelay + 350);
}

function spawnConfettiHearts(n){
  const symbols = ['💜','❤️','💕','✨'];
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    el.className = 'confetti-heart';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    const angle = Math.random()*2*Math.PI;
    const dist = 120 + Math.random()*220;
    const tx = Math.cos(angle)*dist + 'px';
    const ty = Math.sin(angle)*dist - 60 + 'px';
    el.style.setProperty('--tx', tx);
    el.style.setProperty('--ty', ty);
    el.style.animationDuration = (1 + Math.random()*0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

function spawnFallingLilies(n){
  for(let i=0;i<n;i++){
    setTimeout(() => {
      const img = document.createElement('img');
      img.src = lilyURI;
      img.className = 'falling-item';
      img.style.left = Math.random()*96 + 'vw';
      const size = 20 + Math.random()*22;
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      img.style.animationDuration = (3 + Math.random()*2.5) + 's';
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 6000);
    }, i*140);
  }
}

function spawnAmbientHearts(n){
  for(let i=0;i<n;i++){
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'falling-item';
      el.textContent = Math.random() > 0.5 ? '💜' : '♡';
      el.style.left = Math.random()*96 + 'vw';
      el.style.fontSize = (16 + Math.random()*16) + 'px';
      el.style.color = '#8a5fc7';
      el.style.animationDuration = (3.5 + Math.random()*2.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6500);
    }, i*160);
  }
}
